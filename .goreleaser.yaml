version: 2
project_name: azexempt

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: azexempt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - id: azexempt
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: azexempt
    ids:
      - azexempt
    repository:
      owner: Lukas-Klein
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_msg_template: "feat: update {{ .ProjectName }} to {{ .Tag }}"
    commit_author:
      name: Lukas-Klein
      email: 98409808+Lukas-Klein@users.noreply.github.com

    homepage: https://github.com/Lukas-Klein/azexempt
    description: A TUI to easily create policy exemptions for customers in their environment 
    license: MIT
    binaries:
      - azexempt
    dependencies:
      - formula: azure-cli
    url:
      verified: github.com/Lukas-Klein/azexempt/releases/download
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/azexempt"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: Lukas-Klein
    name: azexempt
  draft: false
  # TODO: implement propert prerelease handling
  name_template: "{{ .Tag }}"
